services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: verifierform-stake-bet-lookup:local
    ports:
      - "${PORT:-8080}:80"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: stake_app
      DB_USERNAME: stake
      DB_PASSWORD: secret
      SESSION_DRIVER: file
      CACHE_STORE: file
      LOG_CHANNEL: stderr
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: stake_app
      MYSQL_USER: stake
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025" # Web UI — http://localhost:8025
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "8090:8080"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  db:
