services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/var/www
      - .:/var/laravel-package
      - /var/www/vendor
    env_file:
      - app/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - stake

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - stake

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: stake_app
      MYSQL_USER: stake
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - stake

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI — open http://localhost:8025 to view emails
    networks:
      - stake

  adminer:
    image: adminer:latest
    ports:
      - "8090:8080"
    depends_on:
      - mysql
    networks:
      - stake
    profiles:
      - tools

volumes:
  mysql_data:

networks:
  stake:
    driver: bridge
