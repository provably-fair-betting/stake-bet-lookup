name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2', '8.3']

    name: PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit --no-coverage

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests with coverage
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --path-coverage

      - name: Update coverage badges
        run: |
          php -r "
            \$xml    = simplexml_load_file('coverage.xml');
            \$m      = \$xml->project->metrics;
            echo 'Metrics: ' . print_r((array)\$m, true) . PHP_EOL;
            \$line   = round((int)\$m['coveredstatements']   / max(1, (int)\$m['statements'])   * 100, 1);
            \$branch = round((int)\$m['coveredconditionals'] / max(1, (int)\$m['conditionals']) * 100, 1);
            echo \"Line: \$line%, Branch: \$branch%\" . PHP_EOL;
            \$color  = fn(\$p) => \$p >= 90 ? 'brightgreen' : (\$p >= 70 ? 'yellow' : 'red');
            \$readme = file_get_contents('README.md');
            \$readme = preg_replace('/badge\/Lines-[^-]*%25-[a-z]+/',    'badge/Lines-'   . \$line   . '%25-' . \$color(\$line),   \$readme);
            \$readme = preg_replace('/badge\/Branches-[^-]*%25-[a-z]+/', 'badge/Branches-'. \$branch . '%25-' . \$color(\$branch), \$readme);
            file_put_contents('README.md', \$readme);
          "
          echo "--- README badge lines ---"
          grep "badge/" README.md

      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet README.md; then
            git add README.md &&
            git commit -m "chore: update coverage badges [skip ci]" &&
            git pull --rebase origin main &&
            git push
          fi
